<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini 2D Battle Royale</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #3e8e41; /* Green battleground */
            cursor: crosshair;
        }
        #ui {
            margin-bottom: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">Alive: <span id="aliveCount">10</span> | Health: <span id="health">100</span>%</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const aliveCountUI = document.getElementById("aliveCount");
        const healthUI = document.getElementById("health");

        // Player setup
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#00EAFF',
            speed: 4,
            health: 100
        };

        const keys = {};
        const bullets = [];
        const enemies = [];
        let gameOver = false;

        // Mouse tracking for shooting
        const mouse = { x: 0, y: 0 };

        // Spawn Enemies (Bots)
        function spawnEnemies(count) {
            for (let i = 0; i < count; i++) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: 15,
                    color: '#FF3333',
                    speed: 1.5 + Math.random() * 1.5,
                    health: 50,
                    shootCooldown: Math.random() * 100
                });
            }
        }
        spawnEnemies(9); // 9 bots + 1 player = 10 players total

        // Event Listeners
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => {
            if (gameOver) return;
            // Shoot bullet towards mouse
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                dx: Math.cos(angle) * 7,
                dy: Math.sin(angle) * 7,
                radius: 5,
                color: '#FFFF00',
                fromPlayer: true
            });
        });

        // Game Loop
        function update() {
            if (gameOver) return;

            // Player Movement
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Keep player in bounds
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.dx;
                b.y += b.dy;

                // Remove out of bounds bullets
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Check bullet collisions with enemies
                if (b.fromPlayer) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        const dist = Math.hypot(b.x - e.x, b.y - e.y);
                        if (dist < b.radius + e.radius) {
                            e.health -= 25;
                            bullets.splice(i, 1);
                            if (e.health <= 0) enemies.splice(j, 1);
                            break;
                        }
                    }
                } else {
                    // Check enemy bullet hitting player
                    const dist = Math.hypot(b.x - player.x, b.y - player.y);
                    if (dist < b.radius + player.radius) {
                        player.health -= 10;
                        bullets.splice(i, 1);
                        if (player.health <= 0) {
                            gameOver = true;
                            alert("BOOYAH! Just kidding, you lost. Try again!");
                        }
                    }
                }
            }

            // Update Enemies (AI)
            enemies.forEach(e => {
                // Move towards player slowly
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                // Bot shooting AI
                e.shootCooldown--;
                if (e.shootCooldown <= 0) {
                    bullets.push({
                        x: e.x,
                        y: e.y,
                        dx: Math.cos(angle) * 5,
                        dy: Math.sin(angle) * 5,
                        radius: 5,
                        color: '#FF9900',
                        fromPlayer: false
                    });
                    e.shootCooldown = 60 + Math.random() * 60; // reset cooldown
                }
            });

            // UI Update
            aliveCountUI.textContent = enemies.length + (player.health > 0 ? 1 : 0);
            healthUI.textContent = Math.max(0, player.health);

            if (enemies.length === 0 && player.health > 0) {
                gameOver = true;
                alert("🏆 BOOYAH! You are the Last One Standing! 🏆");
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            if (player.health > 0) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fillStyle = player.color;
                ctx.fill();
                ctx.closePath();
            }

            // Draw Enemies
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.closePath();
            });

            // Draw Bullets
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
                ctx.closePath();
            });
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
